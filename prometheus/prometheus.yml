global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "rule-engine"
    static_configs:
      - targets:
          - "rule-engine-1:8001"
          - "rule-engine-2:8001"
          - "rule-engine-3:8001"
          - "rule-engine-4:8001"
    relabel_configs:
      - source_labels: [__address__]
        target_label: worker
        regex: "rule-engine-(\\d+):.*"
        replacement: "worker-${1}"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
