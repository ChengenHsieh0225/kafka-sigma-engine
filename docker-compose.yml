services:
  # -------------------------------------------------------------------------
  # Kafka (KRaft mode — no Zookeeper)
  # -------------------------------------------------------------------------
  kafka:
    image: apache/kafka:3.8.1
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      # Two data listeners: INTERNAL for intra-Docker traffic, EXTERNAL exposed to host
      KAFKA_LISTENERS: "INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka:29092,EXTERNAL://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: "4"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      CLUSTER_ID: "5L6g3nShT-eMCtK--X86sw"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # -------------------------------------------------------------------------
  # Kafka topic initialisation
  # -------------------------------------------------------------------------
  kafka-init:
    image: apache/kafka:3.8.1
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic raw-logs --partitions 4 --replication-factor 1
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic alerts --partitions 1 --replication-factor 1
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic rule-updates --partitions 1 --replication-factor 1
      echo 'Topics created.'
      "
    restart: "no"

  # -------------------------------------------------------------------------
  # Elasticsearch
  # -------------------------------------------------------------------------
  elasticsearch:
    image: elasticsearch:8.15.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qv '\"status\":\"red\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  # -------------------------------------------------------------------------
  # Prometheus
  # -------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.54.0
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"

  # -------------------------------------------------------------------------
  # Grafana
  # -------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  # -------------------------------------------------------------------------
  # Rule Engine — 4 independent worker processes
  # -------------------------------------------------------------------------
  rule-engine-1:
    build:
      context: .
      dockerfile: services/rule_engine/Dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      SIGMA_RULES_DIR: "/app/sigma_rules"
      METRICS_PORT: "8001"
      WORKER_ID: "1"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped

  rule-engine-2:
    build:
      context: .
      dockerfile: services/rule_engine/Dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      SIGMA_RULES_DIR: "/app/sigma_rules"
      METRICS_PORT: "8001"
      WORKER_ID: "2"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped

  rule-engine-3:
    build:
      context: .
      dockerfile: services/rule_engine/Dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      SIGMA_RULES_DIR: "/app/sigma_rules"
      METRICS_PORT: "8001"
      WORKER_ID: "3"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped

  rule-engine-4:
    build:
      context: .
      dockerfile: services/rule_engine/Dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      SIGMA_RULES_DIR: "/app/sigma_rules"
      METRICS_PORT: "8001"
      WORKER_ID: "4"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # Alert Storage Service
  # -------------------------------------------------------------------------
  alert-storage:
    build:
      context: .
      dockerfile: services/alert_storage/Dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      ELASTICSEARCH_URL: "http://elasticsearch:9200"
      BATCH_SIZE: "500"
      FLUSH_INTERVAL: "5"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # Log Generator
  # -------------------------------------------------------------------------
  log-generator:
    build:
      context: .
      dockerfile: services/log_generator/Dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      LOG_GENERATOR_EPS: "1000"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped
    profiles:
      - load
