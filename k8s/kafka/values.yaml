controller:
  replicaCount: 1

image:
  registry: docker.io
  repository: bitnamilegacy/kafka
  tag: 4.0.0-debian-12-r10

listeners:
  client:
    protocol: PLAINTEXT
  controller:
    protocol: PLAINTEXT
  interbroker:
    protocol: PLAINTEXT

provisioning:
  enabled: true
  topics:
    - name: raw-logs
      partitions: 8
      replicationFactor: 1
    - name: alerts
      partitions: 1
      replicationFactor: 1
    - name: rule-updates
      partitions: 1
      replicationFactor: 1

service:
  type: ClusterIP