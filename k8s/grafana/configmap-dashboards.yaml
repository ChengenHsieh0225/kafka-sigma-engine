apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: kafka-sigma-engine
data:
  sigma_engine.json: |
    {
      "__inputs": [],
      "__elements": {},
      "__requires": [
        {"type": "grafana", "id": "grafana", "name": "Grafana", "version": "11.0.0"},
        {"type": "datasource", "id": "prometheus", "name": "Prometheus", "version": "1.0.0"},
        {"type": "panel", "id": "timeseries", "name": "Time series", "version": ""}
      ],
      "annotations": {"list": []},
      "description": "Kafka Sigma Engine — EPS throughput, p99 matching latency, and consumer lag",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "description": "Events per second — sum of rate(logs_processed_total[1m]) across all Rule Engine workers",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"lineWidth": 2},
              "unit": "ops"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 0},
          "id": 1,
          "options": {"tooltip": {"mode": "multi"}},
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "sum(rate(logs_processed_total[1m]))",
              "legendFormat": "EPS (all workers)",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "rate(logs_processed_total[1m])",
              "legendFormat": "EPS — {{worker}}",
              "refId": "B"
            }
          ],
          "title": "EPS Throughput (logs_processed_total)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "description": "p99 Sigma Rule evaluation latency across all workers",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"lineWidth": 2},
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 8},
          "id": 2,
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "histogram_quantile(0.99, sum(rate(rule_evaluation_duration_seconds_bucket[1m])) by (le))",
              "legendFormat": "p99 latency",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "histogram_quantile(0.50, sum(rate(rule_evaluation_duration_seconds_bucket[1m])) by (le))",
              "legendFormat": "p50 latency",
              "refId": "B"
            }
          ],
          "title": "Rule Evaluation Latency (rule_evaluation_duration_seconds)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "description": "Aggregate consumer lag across all Rule Engine workers — reflects backpressure",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"lineWidth": 2},
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 16},
          "id": 3,
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "sum(kafka_consumer_lag)",
              "legendFormat": "Total lag",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "kafka_consumer_lag",
              "legendFormat": "Lag — {{worker}}",
              "refId": "B"
            }
          ],
          "title": "Kafka Consumer Lag (kafka_consumer_lag)",
          "type": "timeseries"
        }
      ],
      "refresh": "5s",
      "schemaVersion": 39,
      "tags": ["kafka", "sigma", "security"],
      "templating": {
        "list": [
          {
            "current": {},
            "hide": 0,
            "includeAll": false,
            "name": "datasource",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "type": "datasource",
            "label": "Data Source"
          }
        ]
      },
      "time": {"from": "now-15m", "to": "now"},
      "timepicker": {},
      "timezone": "browser",
      "title": "Kafka Sigma Engine",
      "uid": "kafka-sigma-engine",
      "version": 1
    }
