apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  # Only the "pod" role is used in prometheus-config's kubernetes_sd_configs
  # (no node/service/endpoints roles, no attach_metadata), so pods is the
  # only resource actually read.
  - apiGroups: [""]
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
